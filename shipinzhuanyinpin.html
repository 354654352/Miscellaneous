<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频转音频 - Video to Audio Converter</title>
    <script src="https://unpkg.com/lamejs@1.2.0/lame.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            margin-bottom: 20px;
        }

        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #f5efff;
            transform: scale(1.02);
        }

        .upload-area .icon {
            font-size: 4rem;
            margin-bottom: 15px;
            color: #667eea;
        }

        .upload-area h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 1.3rem;
        }

        .upload-area p {
            color: #666;
            font-size: 0.95rem;
        }

        .upload-area p span {
            color: #667eea;
            font-weight: 600;
        }

        #fileInput {
            display: none;
        }

        .file-info {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .file-info.show {
            display: block;
        }

        .file-info .file-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .file-info .file-size {
            color: #666;
            font-size: 0.9rem;
        }

        .preview-section {
            display: none;
            margin-top: 25px;
        }

        .preview-section.show {
            display: block;
        }

        .preview-section h4 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        video {
            width: 100%;
            max-height: 300px;
            border-radius: 8px;
            background: #000;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(17, 153, 142, 0.4);
        }

        .progress-container {
            display: none;
            margin-top: 20px;
        }

        .progress-container.show {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            transition: width 0.1s ease;
            width: 0%;
        }

        .progress-text {
            color: #666;
            font-size: 0.9rem;
            text-align: center;
        }

        .audio-preview {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 12px;
            color: white;
        }

        .audio-preview.show {
            display: block;
        }

        .audio-preview h4 {
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        audio {
            width: 100%;
            margin-bottom: 15px;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .error-message {
            display: none;
            margin-top: 15px;
            padding: 12px;
            background: #ffebee;
            border-left: 4px solid #f44336;
            color: #c62828;
            border-radius: 4px;
            font-size: 0.95rem;
        }

        .error-message.show {
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
        }

        .footer a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.8rem;
            }

            header p {
                font-size: 1rem;
            }

            .card {
                padding: 20px;
            }

            .upload-area {
                padding: 30px 20px;
            }

            .upload-area .icon {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 视频转音频</h1>
            <p>将视频文件转换为高质量音频，完全在浏览器中处理，隐私安全</p>
        </header>

        <div class="card">
            <div class="upload-area" id="uploadArea">
                <div class="icon">📁</div>
                <h3>点击或拖拽视频文件到此处</h3>
                <p>支持 MP4、WebM、AVI、MOV 等常见格式<br><span>最大支持 50MB 文件</span></p>
                <input type="file" id="fileInput" accept="video/*">
            </div>

            <div class="file-info" id="fileInfo">
                <div class="file-name" id="fileName"></div>
                <div class="file-size" id="fileSize"></div>
            </div>

            <div class="preview-section" id="previewSection">
                <h4>🎥 视频预览</h4>
                <video id="videoPlayer" controls></video>

                <div class="controls">
                    <button class="btn btn-primary" id="convertBtn">▶ 开始转换</button>
                    <button class="btn btn-secondary" id="resetBtn">↺ 重新选择</button>
                </div>
            </div>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">准备转换...</div>
            </div>

            <div class="audio-preview" id="audioPreview">
                <h4>🎵 转换结果</h4>
                <audio id="audioPlayer" controls></audio>
                <button class="btn btn-success download-btn" id="downloadBtn">📥 下载音频文件</button>
            </div>

            <div class="error-message" id="errorMessage"></div>
        </div>

        <div class="footer">
            <p>所有处理均在浏览器本地完成，您的文件不会上传到任何服务器</p>
            <p style="margin-top: 10px;">托管于 <a href="https://github.com" target="_blank">GitHub Pages</a></p>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const previewSection = document.getElementById('previewSection');
        const videoPlayer = document.getElementById('videoPlayer');
        const convertBtn = document.getElementById('convertBtn');
        const resetBtn = document.getElementById('resetBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const audioPreview = document.getElementById('audioPreview');
        const audioPlayer = document.getElementById('audioPlayer');
        const downloadBtn = document.getElementById('downloadBtn');
        const errorMessage = document.getElementById('errorMessage');

        let videoFile = null;
        let audioBlob = null;

        uploadArea.addEventListener('click', () => { fileInput.click(); });
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
        uploadArea.addEventListener('dragleave', () => { uploadArea.classList.remove('dragover'); });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('video/')) {
                handleFile(files[0]);
            } else {
                showError('请上传有效的视频文件');
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('video/')) {
                showError('请上传有效的视频文件');
                return;
            }

            const maxSize = 50 * 1024 * 1024;
            if (file.size > maxSize) {
                showError('文件大小不能超过 50MB');
                return;
            }

            videoFile = file;
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);
            
            fileInfo.classList.add('show');
            const videoUrl = URL.createObjectURL(file);
            videoPlayer.src = videoUrl;
            
            previewSection.classList.add('show');
            audioPreview.classList.remove('show');
            errorMessage.classList.remove('show');
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        function hideError() {
            errorMessage.classList.remove('show');
        }

        resetBtn.addEventListener('click', () => {
            videoFile = null;
            audioBlob = null;
            fileInput.value = '';
            videoPlayer.src = '';
            audioPlayer.src = '';
            
            fileInfo.classList.remove('show');
            previewSection.classList.remove('show');
            progressContainer.classList.remove('show');
            audioPreview.classList.remove('show');
            hideError();
            
            progressFill.style.width = '0%';
            progressText.textContent = '准备转换...';
        });

        convertBtn.addEventListener('click', async () => {
            if (!videoFile) return;
            
            hideError();
            progressContainer.classList.add('show');
            convertBtn.disabled = true;
            audioPreview.classList.remove('show');
            
            try {
                await convertVideoToAudio();
            } catch (error) {
                showError('转换失败: ' + error.message);
                progressContainer.classList.remove('show');
            } finally {
                convertBtn.disabled = false;
            }
        });

        function floatTo16BitPCM(input) {
            const output = new Int16Array(input.length);
            for (let i = 0; i < input.length; i++) {
                const s = Math.max(-1, Math.min(1, input[i]));
                output[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return output;
        }
        
        async function convertVideoToAudio() {
            progressText.textContent = '正在读取文件...';
            progressFill.style.width = '10%';
            
            const arrayBuffer = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = () => reject(new Error('文件读取失败'));
                reader.readAsArrayBuffer(videoFile);
            });
            
            progressText.textContent = '正在解码音频...';
            progressFill.style.width = '30%';
            
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            let audioBuffer;
            try {
                audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
            } catch (decodeError) {
                audioContext.close();
                throw new Error('音频解码失败，请尝试使用其他视频文件或浏览器');
            }
            
            progressText.textContent = '正在编码 MP3...';
            progressFill.style.width = '50%';
            
            const sampleRate = audioBuffer.sampleRate;
            const channels = audioBuffer.numberOfChannels;
            const samples = audioBuffer.length;
            
            const mp3Encoder = new lamejs.Mp3Encoder(channels, sampleRate, 128);
            
            const blockSize = 1152;
            const mp3Data = [];
            
            for (let i = 0; i < samples; i += blockSize) {
                const leftFloat = audioBuffer.getChannelData(0).subarray(i, i + blockSize);
                const left = floatTo16BitPCM(leftFloat);
                
                let mp3buf;
                if (channels === 1) {
                    mp3buf = mp3Encoder.encodeBuffer(left);
                } else {
                    const rightFloat = audioBuffer.getChannelData(1).subarray(i, i + blockSize);
                    const right = floatTo16BitPCM(rightFloat);
                    mp3buf = mp3Encoder.encodeBuffer(left, right);
                }
                
                if (mp3buf.length > 0) {
                    mp3Data.push(mp3buf);
                }
                
                const progress = 50 + (i / samples) * 45;
                progressFill.style.width = progress + '%';
                progressText.textContent = '正在转换: ' + Math.round(progress) + '%';
            }
            
            const mp3buf = mp3Encoder.flush();
            if (mp3buf.length > 0) {
                mp3Data.push(mp3buf);
            }
            
            audioContext.close();
            
            audioBlob = new Blob(mp3Data, { type: 'audio/mp3' });
            const audioUrl = URL.createObjectURL(audioBlob);
            audioPlayer.src = audioUrl;
            
            progressFill.style.width = '100%';
            progressText.textContent = '转换完成!';
            
            setTimeout(() => {
                audioPreview.classList.add('show');
            }, 500);
        }

        downloadBtn.addEventListener('click', () => {
            if (!audioBlob) return;
            
            const originalName = videoFile.name.replace(/\.[^/.]+$/, '');
            const fileName = originalName + '_audio.mp3';
            
            const url = URL.createObjectURL(audioBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        if (!window.AudioContext && !window.webkitAudioContext) {
            showError('您的浏览器不支持音频处理功能，请使用 Chrome 或 Firefox 浏览器');
            convertBtn.disabled = true;
        }
        
        if (typeof lamejs === 'undefined') {
            showError('音频编码库加载失败，请检查网络连接或刷新页面重试');
            convertBtn.disabled = true;
        }
    </script>
</body>
</html>
